services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgerscope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ledgerscope
      POSTGRES_PASSWORD: ledgerscope
      POSTGRES_DB: ledgerscope
    ports:
      - "5432:5432"
    volumes:
      - ledgerscope_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerscope -d ledgerscope"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ledgerscope_postgres_data:
